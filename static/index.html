<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAssist</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
    <div id="app">
        <aside id="sidebar">
            <div class="sidebar-header">
                <h1>CodeAssist</h1>
                <button id="new-session-btn" title="New Session">+</button>
            </div>
            <div id="session-list"></div>
            <div class="sidebar-footer">
                <div id="model-info"></div>
            </div>
        </aside>
        <main id="chat-area">
            <div id="messages"></div>
            <div id="plan-display"></div>
            <div id="input-area">
                <textarea id="user-input" placeholder="Ask me anything..." rows="1"></textarea>
                <button id="send-btn" title="Send (Enter)">&#9654;</button>
                <button id="stop-btn" title="Stop" style="display:none;">&#9632;</button>
            </div>
        </main>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
