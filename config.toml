[llm]
# "openai" = OpenAI-compatible API format (works for OpenAI, llama.cpp, vLLM, etc.)
provider = "openai"

# Model name:
#   OpenAI:    "gpt-4o", "gpt-4o-mini", "o3-mini", etc.
#   llama.cpp: whatever you passed with -m to llama-server (e.g. "local-model", "codellama-13b")
#   vLLM:      the model name you served (e.g. "meta-llama/Llama-3-8B-Instruct")
model = "gpt-4o"

# API key:
#   OpenAI:    your real key, e.g. "sk-..."
#   llama.cpp: not checked, use any value like "none"
api_key = ""

# Base URL:
#   OpenAI:    leave empty "" (defaults to api.openai.com)
#   llama.cpp: "http://localhost:8080/v1"
#   vLLM:      "http://localhost:8000/v1"
base_url = ""

[llm.parameters]
temperature = 0.0
max_tokens = 8192

# Context window size in tokens. Set this to match your model's actual limit.
# llama.cpp models are often 4096-32768, OpenAI models are 128000-200000.
context_window = 128000

# Embedding model for knowledge base semantic search (optional)
# Only needed if your provider supports embeddings
# embedding_model = "text-embedding-3-small"

[server]
host = "127.0.0.1"
port = 8000
workspace = "."

[agent]
max_iterations = 30
name = "CodeAssist"

[tools]
shell_timeout = 120
max_output_chars = 20000
webfetch_max_chars = 30000
