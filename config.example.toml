[llm]
# "openai" = OpenAI-compatible API format (works for OpenAI, llama.cpp, vLLM, etc.)
provider = "openai"

# Model name:
#   OpenAI:    "gpt-4o", "gpt-4o-mini", "o3-mini", etc.
#   llama.cpp: whatever you passed with -m to llama-server (e.g. "local-model", "codellama-13b")
#   vLLM:      the model name you served (e.g. "meta-llama/Llama-3-8B-Instruct")
model = "gpt-4o"

# API key:
#   OpenAI:    your real key, e.g. "sk-..."
#   llama.cpp: not checked, use any value like "none"
api_key = ""

# Base URL:
#   OpenAI:    leave empty "" (defaults to api.openai.com)
#   llama.cpp: "http://localhost:8080/v1"
#   vLLM:      "http://localhost:8000/v1"
base_url = ""

[llm.parameters]
temperature = 0.0
max_tokens = 8192

# Context window size in tokens. Set this to match your model's actual limit.
# llama.cpp models are often 4096-32768, OpenAI models are 128000-200000.
context_window = 128000

# Embedding model for knowledge base semantic search (optional)
# Only needed if your provider supports embeddings
# Common models: "text-embedding-3-small", "text-embedding-3-large", "text-embedding-ada-002"
# embedding_model = "text-embedding-3-small"

[server]
host = "127.0.0.1"
port = 8090
workspace = "."

# Server authentication password (optional)
# Set this to enable Basic Auth for the API
# password = ""

[agent]
max_iterations = 30
name = "CodeAssist"
default_agent = "default"

# Auto-creation settings
# CodeAssist can automatically create skills and tools when it detects repetitive patterns
auto_create_skills = true      # Auto-create skills for repetitive workflows
auto_create_tools = false      # Disabled by default (security concern)
max_auto_creations = 3         # Max auto-creations per session
min_confidence = 0.7           # Minimum confidence threshold for auto-creation

[tools]
# Shell command timeout in seconds
shell_timeout = 120

# Maximum output size for shell commands (characters)
max_output_chars = 20000

# Maximum output size for webfetch (characters)
webfetch_max_chars = 30000

# Maximum output size for websearch (characters)
websearch_max_chars = 30000

# Maximum tokens for tool output truncation
tool_output_max_tokens = 4000

[mcp]
# Enable MCP (Model Context Protocol) client
enabled = false

# MCP server configurations
# [mcp.servers.server_name]
#   url = "http://localhost:3001/sse"
#   headers = {}
#   env = {}

[skills]
# Enable skills system
enabled = true

# Directories to search for skills (relative to workspace)
directories = [".codeassist/skills"]

[plugins]
# Enable plugin system
enabled = false

# Directories to search for plugins (relative to workspace)
directories = [".codeassist/plugins"]

[lsp]
# Enable LSP (Language Server Protocol) integration
enabled = false

# LSP server configurations
# [lsp.servers.server_name]
#   command = "typescript-language-server"
#   args = ["--stdio"]
#   languages = ["typescript", "javascript"]

[git]
# Enable Git integration
enabled = true

# Automatically detect Git repositories in workspace
auto_detect = true

[compaction]
# Enable context window compaction
enabled = true

# Trigger compaction when context usage exceeds this percentage
threshold_pct = 75

# Number of recent messages to keep intact during compaction
keep_recent = 20

# Maximum tokens for truncated tool results
tool_result_max_tokens = 4000
